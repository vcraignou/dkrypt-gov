<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>DKRYPT Token Snapshots</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 32px;
      background: #f5f5f5;
      color: #222;
    }

    h1 {
      margin-bottom: 6px;
      font-size: 28px;
    }

    .generated {
      color: #666;
      margin-bottom: 28px;
      font-size: 13px;
    }

    .snapshot {
      background: white;
      border: 1px solid #ddd;
      border-radius: 12px;
      padding: 22px;
      margin-bottom: 24px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.04);
    }

    .token {
      font-size: 24px;
      font-weight: bold;
      margin-bottom: 12px;
    }

    .badges {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin: 12px 0 18px;
    }

    .badge {
      display: inline-block;
      padding: 6px 10px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: bold;
      background: #eef1f5;
      color: #333;
    }

    .badge.green {
      background: #dff5e5;
      color: #116b2f;
    }

    .badge.orange {
      background: #fff0d6;
      color: #945f00;
    }

    .badge.red {
      background: #fdecea;
      color: #b71c1c;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 10px;
      margin-top: 8px;
    }

    .metric {
      background: #f7f8fa;
      border: 1px solid #e4e6eb;
      border-radius: 8px;
      padding: 10px;
      font-size: 14px;
    }

    .metric-label {
      font-size: 11px;
      color: #666;
      text-transform: uppercase;
      margin-bottom: 4px;
    }

    .metric-value {
      font-size: 15px;
      font-weight: bold;
    }

    .section-title {
      margin-top: 20px;
      margin-bottom: 8px;
      font-size: 12px;
      text-transform: uppercase;
      color: #666;
      letter-spacing: 0.6px;
      font-weight: bold;
    }

    .text-block {
      font-size: 14px;
      line-height: 1.45;
      color: #333;
    }

    .conclusion {
      background: #f7f8fa;
      border-left: 4px solid #222;
      padding: 12px;
      border-radius: 6px;
      font-size: 14px;
      line-height: 1.45;
    }

    table {
      border-collapse: collapse;
      width: 100%;
      margin-top: 10px;
      font-size: 13px;
    }

    th, td {
      border-bottom: 1px solid #ddd;
      padding: 7px 8px;
      text-align: center;
    }

    th:first-child,
    td:first-child {
      text-align: left;
    }

    th {
      background: #f0f0f0;
      font-size: 12px;
      text-transform: uppercase;
      color: #555;
    }

    .highlight {
      font-weight: bold;
      background: #fff8dc;
    }
  </style>
</head>

<body>
  <h1>DKRYPT Token Snapshots</h1>
  <div id="generated" class="generated">Loading...</div>
  <div id="snapshots"></div>

  <script>
    const URL = "https://vcraignou.github.io/dkrypt-gov/snapshots.json?v=" + Date.now();

    function fmtNumber(x) {
      if (x === null || x === undefined || x === "") return "n/a";
      const n = Number(x);
      if (Number.isNaN(n)) return x;

      if (Math.abs(n) >= 1_000_000_000) return (n / 1_000_000_000).toFixed(2) + "B";
      if (Math.abs(n) >= 1_000_000) return (n / 1_000_000).toFixed(2) + "M";
      if (Math.abs(n) >= 1_000) return (n / 1_000).toFixed(2) + "K";

      return n.toFixed(2);
    }

    function fmtPct(x) {
      if (x === null || x === undefined || x === "") return "n/a";
      const n = Number(x);
      if (Number.isNaN(n)) return x;
      return n.toFixed(1) + "%";
    }

    function ragBadge(label, value) {
      const safeValue = value || "orange";
      return `<span class="badge ${safeValue}">${label}: ${String(safeValue).toUpperCase()}</span>`;
    }

    function renderPeerTable(peerTable) {
      if (!peerTable || peerTable.length === 0) return "";

      let html = "<table><thead><tr><th>Name</th><th>Type</th><th>FDV / Fees</th><th>FDV / Rev</th></tr></thead><tbody>";

      peerTable.forEach(row => {
        html += `
          <tr class="${row.highlight ? "highlight" : ""}">
            <td>${row.name || "n/a"}</td>
            <td>${row.type || "n/a"}</td>
            <td>${fmtNumber(row.fdv_fees_90d)}</td>
            <td>${fmtNumber(row.fdv_revenues_90d)}</td>
          </tr>
        `;
      });

      html += "</tbody></table>";
      return html;
    }

    async function load() {
      try {
        const res = await fetch(URL, { cache: "no-store" });
        if (!res.ok) throw new Error("HTTP " + res.status);

        const data = await res.json();

        document.getElementById("generated").innerText =
          `Generated: ${data.generated_at || "n/a"} | Tokens: ${data.count || 0}`;

        const container = document.getElementById("snapshots");
        container.innerHTML = "";

        (data.snapshots || []).forEach(s => {
          const div = document.createElement("div");
          div.className = "snapshot";

          const rag = s.rag || {};
          const gov = s.governance || {};

          div.innerHTML = `
            <div class="token">${s.token || "n/a"} — ${s.protocol || "n/a"}</div>

            <div class="section-title">Investment signals</div>
            <div class="badges">
              ${ragBadge("Governance", rag.governance)}
              ${ragBadge("Adoption", rag.adoption)}
              ${ragBadge("Financials", rag.financials)}
              ${ragBadge("Valuation", rag.valuation)}
              ${ragBadge("Tokenomics", rag.tokenomics)}
            </div>

            <div class="section-title">Governance and value accrual</div>
            <div class="grid">
              <div class="metric">Dual Labs-DAO structure: <b>${gov.dual_lab_dao_structure === true ? "Yes" : "No"}</b></div>
              <div class="metric">DAO decentralised enough: <b>${gov.dao_decentralised_enough === true ? "Yes" : "No"}</b></div>
              <div class="metric">Direct revenue accrual: <b>${gov.direct_revenue_accrual_to_protocol === true ? "Yes" : "No"}</b></div>
              <div class="metric">Accrual type: <b>${gov.revenue_accrual_type || "n/a"}</b></div>
            </div>
            <div class="text-block" style="margin-top:10px;">${gov.notes || ""}</div>

            <div class="section-title">Adoption</div>
            <div class="grid">
              <div class="metric">TVL: <b>${fmtNumber(s.adoption?.tvl)}</b></div>
              <div class="metric">3m TVL change: <b>${fmtPct(s.adoption?.tvl_change_3m_pct)}</b></div>
            </div>

            <div class="section-title">Key metrics</div>
            <div class="grid">
              <div class="metric">FDV / Fees: <b>${fmtNumber(s.valuation?.fdv_fees_90d)}x</b></div>
              <div class="metric">FDV / Revenues: <b>${fmtNumber(s.valuation?.fdv_revenues_90d)}x</b></div>
              <div class="metric">MC / FDV: <b>${fmtNumber(s.tokenomics?.mc_fdv)}</b></div>
              <div class="metric">Unlock 12m: <b>${fmtPct(s.tokenomics?.unlock_12m_pct)}</b></div>
              <div class="metric">Fees 90d ARR: <b>${fmtNumber(s.financials?.fees_90d_arr)}</b></div>
              <div class="metric">Revenue 90d ARR: <b>${fmtNumber(s.financials?.revenues_90d_arr)}</b></div>
            </div>

            <div class="section-title">Investment conclusion</div>
            <div class="conclusion">${s.conclusion || "n/a"}</div>

            <div class="section-title">Relative valuation</div>
            ${renderPeerTable(s.valuation?.peer_table)}

            <div class="section-title">Overview</div>
            <div class="text-block">${s.overview || "n/a"}</div>

            <div class="section-title">Team</div>
            <div class="text-block">${s.team || "n/a"}</div>

            <div class="section-title">Product / market fit</div>
            <div class="text-block">${s.product_market_fit || "n/a"}</div>
          `;

          container.appendChild(div);
        });

      } catch (err) {
        document.getElementById("generated").innerText =
          "Could not load token snapshots: " + err.message;
      }
    }

    load();
  </script>
</body>
</html>
