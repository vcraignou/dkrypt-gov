<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>DKRYPT Governance Monitor</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 40px;
            background: #f5f5f5;
            color: #222;
        }
        h1 {
            margin-bottom: 8px;
        }
        .generated {
            color: #666;
            margin-bottom: 24px;
        }
        .section {
            margin-top: 30px;
        }
        .card {
            background: white;
            padding: 15px;
            margin-bottom: 12px;
            border-radius: 8px;
            border: 1px solid #ddd;
        }
        .protocol {
            font-weight: bold;
            color: #2c3e50;
            margin-bottom: 6px;
        }
        .title {
            font-size: 16px;
            margin-bottom: 6px;
        }
        .meta {
            font-size: 12px;
            color: #777;
            margin-bottom: 8px;
        }
        a {
            color: #0b57d0;
            text-decoration: none;
        }
        a:hover {
            text-decoration: underline;
        }
        .empty {
            color: #777;
            font-style: italic;
        }
    </style>
</head>
<body>

<h1>DKRYPT Governance Monitor</h1>
<div id="generated" class="generated">Loading...</div>

<div class="section">
    <h2>Impact</h2>
    <div id="impact"></div>
</div>

<div class="section">
    <h2>Watch</h2>
    <div id="watch"></div>
</div>

<script>
const URL = "https://vcraignou.github.io/dkrypt-gov/governance_summary.json";

async function load() {
    try {
        const res = await fetch(URL);
        if (!res.ok) {
            throw new Error("HTTP " + res.status);
        }

        const data = await res.json();

        document.getElementById("generated").innerText =
            "Generated: " + (data.generated_at || "n/a");

        function render(list, containerId, emptyText) {
            const container = document.getElementById(containerId);
            container.innerHTML = "";

            if (!list || list.length === 0) {
                container.innerHTML = `<div class="empty">${emptyText}</div>`;
                return;
            }

            list.forEach(item => {
                const div = document.createElement("div");
                div.className = "card";

                div.innerHTML = `
                    <div class="protocol">${item.protocol || "UNKNOWN"}</div>
                    <div class="title">${item.title || "Untitled"}</div>
                    <div class="meta">${item.signal || "n/a"} | ${item.stage || "n/a"}</div>
                    <a href="${item.url || "#"}" target="_blank" rel="noopener noreferrer">Open</a>
                `;

                container.appendChild(div);
            });
        }

        render(data.impact || [], "impact", "No current impact items.");
        render(data.watch || [], "watch", "No current watch items.");

    } catch (err) {
        document.getElementById("generated").innerText =
            "Could not load governance feed: " + err.message;
    }
}

load();
</script>

</body>
</html>
